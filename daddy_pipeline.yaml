          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef llm_eval(data:str)->str:\n    import json\n    import os\n  \
          \  import dotenv\n    dotenv.load_dotenv()\n    from langchain_nvidia_ai_endpoints\
          \ import ChatNVIDIA\n    client_eval=ChatNVIDIA(\n        model=os.getenv(\"\
          NVIDIA_MODEL2\"),\n        api_key=os.getenv(\"NVIDIA_API_KEY2\"),\n   \
          \     top_p=1,\n        temperature=0.3,\n        max_completion_tokens=512,\n\
          \    )\n    def semantic_search(questoin:str,topK:int=2)->str:\n       \
          \ import os\n        import json\n        import dotenv\n        dotenv.load_dotenv()\n\
          \        from pymilvus import MilvusClient,DataType\n        from sentence_transformers\
          \ import SentenceTransformer\n        client_milvus=MilvusClient(\n    \
          \        uri=os.getenv(\"MILVUS_URI\"),\n            token=os.getenv(\"\
          MILVUS_TOKEN\")\n        )\n        collection_name=os.getenv(\"MILVUS_COLLECTION_NAME\"\
          )\n        embedding_model=os.getenv(\"EMBEDDING_MODEL\")\n        embedd=SentenceTransformer(embedding_model)\n\
          \        client_milvus.load_collection(collection_name)\n        qv=embedd.encode([questoin],normalize_embeddings=True).tolist()[0]\n\
          \        ans=client_milvus.search(\n            collection_name=collection_name,\n\
          \            data=[qv],\n            limit=topK,\n            output_fields=[\"\
          chunk_id\",\"text\"],\n            search_params={\"metric_type\":\"COSINE\"\
          }\n        )\n        return json.dumps(ans,ensure_ascii=False)\n    def\
          \ first_json(text):\n        text=text.strip().replace(\"```json\",\"\"\
          ).replace(\"```\",\"\").strip()\n        start_candidates=[i for i in [text.find(\"\
          [\"),text.find(\"{\")] if i!=-1]\n        if not start_candidates:\n   \
          \         raise ValueError(\"No JSON found\")\n        start=min(start_candidates)\n\
          \        obj,_=json.JSONDecoder().raw_decode(text[start:])\n        return\
          \ obj\n    x=json.loads(data)\n    if isinstance(x,str):\n        x=json.loads(x)\n\
          \    if isinstance(x,dict):\n        x=[x]\n    if not isinstance(x,list):\n\
          \        raise ValueError(\"Format wrong guyssss\")\n    ans2=[]\n    for\
          \ i in x:\n        c=i.get(\"question\",\"\")\n        candi=i.get(\"candidate_answers\"\
          ,[])\n        chunks=semantic_search(c,2)\n        if isinstance(chunks,str):\n\
          \            chunks=json.loads(chunks)\n\n        # prompt=f\"\"\"\n   \
          \     # You are an expert evaluater. \n        # You have:\n        # 1.\
          \ Question: {c}\n        # 2. Candidate answers: {candi}\n        # 3. Relevant\
          \ chunks: {chunks}\n        # YOUR JOB IS TO UNDERSTAND THE QUESTION AND\
          \ THE RELEVANT CHUNKS YOU HAVE. \n        # FROM THAT YOU HAVE TO EVALUATE\
          \ EACH CANDIDATE ANSWER. \n        # 2. ACCEPT a candidate if it correctly\
          \ answers the question AND its core facts align with the Ground Truth. Synonyms\
          \ and rephrasing are perfectly fine.\n        # 3. REJECT a candidate if\
          \ it introduces new facts, industries, or concepts NOT found in the Ground\
          \ Truth (e.g., hallucinating external knowledge).\n        # 4. REJECT a\
          \ candidate if it contradicts the Ground Truth or misses the core point.\n\
          \        # 5. CRITICAL: You MUST include an evaluation object for EVERY\
          \ single candidate answer provided in the input. Do NOT omit, skip, or filter\
          \ out any candidate answer, regardless of whether it is accepted or rejected.\n\
          \        # Output ONLY valid JSON without markdown code blocks (no ```json)\
          \ in this exact format:\n        # {{\n        #     \"question\": \"{c}\"\
          ,\n        #     \"candidate_answers\": [\n        #         {{\n      \
          \  #             \"candidate_answer\": \"<insert candidate answer text here>\"\
          ,\n        #             \"status\": \"<accepted or rejected>\"\n      \
          \  #         }}\n        #     ]\n        # }}\n        # \"\"\"\n     \
          \   prompt=f\"\"\"\n        You are an expert evaluator.\n\n        You\
          \ have:\n        1. Question: {c}\n        2. Candidate answers: {json.dumps(candi,ensure_ascii=False)}\n\
          \        3. Relevant chunks: {json.dumps(chunks,ensure_ascii=False)}\n\n\
          \        Your job is to understand the question and the relevant chunks.\n\
          \        From that, evaluate each candidate answer.\n\n        1. ACCEPT\
          \ a candidate if it correctly answers the question and its core facts align\
          \ with the retrieved chunks.\n        2. REJECT a candidate if it adds unsupported\
          \ facts or goes beyond the retrieved chunks.\n        3. REJECT a candidate\
          \ if it contradicts the retrieved chunks or misses the core point.\n   \
          \     4. You must include an evaluation object for every candidate answer.\n\
          \n        Output ONLY valid JSON in this exact format:\n        {{\n   \
          \         \"question\": \"{c}\",\n            \"evaluations\": [\n     \
          \           {{\n                    \"candidate_answer\": \"<insert candidate\
          \ answer text here>\",\n                    \"status\": \"<accepted or rejected>\"\
          \n                }}\n            ]\n        }}\n        \"\"\"\n      \
          \  eval_raw=client_eval.invoke(prompt).content\n        try:\n         \
          \   p=first_json(eval_raw)\n        except:\n            p={\n         \
          \       \"question\":c,\n                \"evaluations\":[\n           \
          \         {\"candidate_answer\":x,\"status\":\"rejected\"}\n           \
          \         for x in candi\n                ]\n            }\n        if not\
          \ isinstance(p,dict):\n            p={\n                \"question\":c,\n\
          \                \"evaluations\":[\n                    {\"candidate_answer\"\
          :x,\"status\":\"rejected\"}\n                    for x in candi\n      \
          \          ]\n            }\n\n        if \"question\" not in p:\n     \
          \       p[\"question\"]=c\n\n        if \"evaluations\" not in p or not\
          \ isinstance(p[\"evaluations\"],list):\n            p[\"evaluations\"]=[\n\
          \                {\"candidate_answer\":x,\"status\":\"rejected\"}\n    \
          \            for x in candi\n            ]\n        ans=[]\n        sett=set()\n\
          \        for j in p[\"evaluations\"]:\n            if isinstance(j,dict):\n\
          \                cand=j.get(\"candidate_answer\",\"\").strip()\n       \
          \         status=j.get(\"status\",\"rejected\").strip().lower()\n      \
          \          if cand:\n                    ans.append({\n                \
          \        \"candidate_answer\":cand,\n                        \"status\"\
          :\"accepted\" if status==\"accepted\" else \"rejected\"\n              \
          \      })\n                    sett.add(cand)\n\n        for x in candi:\n\
          \            if x not in sett:\n                ans.append({\n         \
          \           \"candidate_answer\":x,\n                    \"status\":\"rejected\"\
          \n                })\n        p[\"evaluations\"]=ans\n        ans2.append(p)\n\
          \    return json.dumps(ans2,ensure_ascii=False)\n\n"
        env:
        - name: NVIDIA_API_KEY2
          value: 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
