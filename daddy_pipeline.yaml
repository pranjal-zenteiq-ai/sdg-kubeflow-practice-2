          \n        # dean_output.append(p)\n        dean_raw=client_dean.invoke(prompt_dean).content\n\
          \        try:\n            p=first_json(dean_raw)\n        except:\n   \
          \         p={\n                \"question\":c,\n                \"original_ans\"\
          :a,\n                \"evaluations\":[\n                    {\"candidate_answer\"\
          :x,\"status\":\"rejected\"}\n                    for x in candidate_answers\n\
          \                ]\n            }\n        if not isinstance(p,dict):\n\
          \            p={\n                \"question\":c,\n                \"original_ans\"\
          :a,\n                \"evaluations\":[\n                    {\"candidate_answer\"\
          :x,\"status\":\"rejected\"}\n                    for x in candidate_answers\n\
          \                ]\n            }\n        if \"question\" not in p:\n \
          \           p[\"question\"]=c\n        if \"original_ans\" not in p:\n \
          \           p[\"original_ans\"]=a\n\n        if \"evaluations\" not in p\
          \ or not isinstance(p[\"evaluations\"],list):\n            p[\"evaluations\"\
          ]=[\n                {\"candidate_answer\":x,\"status\":\"rejected\"}\n\
          \                for x in candidate_answers\n            ]\n        clean_evals=[]\n\
          \        seen=set()\n        for j in p[\"evaluations\"]:\n            if\
          \ isinstance(j,dict):\n                cand=j.get(\"candidate_answer\",\"\
          \").strip()\n                status=j.get(\"status\",\"rejected\").strip().lower()\n\
          \                if cand:\n                    clean_evals.append({\n  \
          \                      \"candidate_answer\":cand,\n                    \
          \    \"status\":\"accepted\" if status==\"accepted\" else \"rejected\"\n\
          \                    })\n                    seen.add(cand)\n        for\
          \ x in candidate_answers:\n            if x not in seen:\n             \
          \   clean_evals.append({\n                    \"candidate_answer\":x,\n\
          \                    \"status\":\"rejected\"\n                })\n     \
          \   p[\"evaluations\"]=clean_evals\n        dean_output.append(p)\n    return\
          \ json.dumps(dean_output)\n\n"
        env:
        - name: NVIDIA_API_KEY2
          value: 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
