          \        #     p={\"question\":c,\"original_ans\":a,\"candidate_answers\"\
          :candidate_answers}\n\n        # if not isinstance(p,dict):\n        # \
          \    p={\"question\":c,\"original_ans\":a,\"candidate_answers\":candidate_answers}\n\
