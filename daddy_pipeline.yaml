          answer\"):\n                candidate_answers.append(j[\"answer\"].strip())\n\
          \        ans.append({\n            \"question\":c,\n            \"original_ans\"\
          :a,\n            \"candidate_answers\":candidate_answers\n        })\n \
          \   return json.dumps(ans,ensure_ascii=False)\n\n"
