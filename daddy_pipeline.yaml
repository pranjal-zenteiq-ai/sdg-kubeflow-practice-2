deploymentSpec:
  executors:
    exec-chunking:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - chunking
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'sentence-transformers>=5.4.1'\
          \ 'pymilvus>=2.6.12' 'python-dotenv>=1.2.2'  &&  python3 -m pip install\
          \ --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef chunking(md:str)->str:\n    import os\n    import json \n   \
          \ import uuid\n    import dotenv\n    from pymilvus import MilvusClient,DataType\n\
          \    from sentence_transformers import SentenceTransformer\n    dotenv.load_dotenv()\n\
          \    client_milvus = MilvusClient(\n        uri=os.getenv(\"MILVUS_URI\"\
          ),\n        token=os.getenv(\"MILVUS_TOKEN\")\n    )\n    collection_name=os.getenv(\"\
          MILVUS_COLLECTION_NAME\")\n    embedding_model=os.getenv(\"EMBEDDING_MODEL\"\
          )\n    embedd=SentenceTransformer(embedding_model)\n    dim=embedd.get_embedding_dimension()\n\
          \    if not client_milvus.has_collection(collection_name):\n        schema=client_milvus.create_schema(auto_id=False)\n\
          \        schema.add_field(field_name=\"chunk_id\",datatype=DataType.VARCHAR,is_primary=True,max_length=100)\n\
          \        schema.add_field(field_name=\"text\",datatype=DataType.VARCHAR,max_length=2000)\n\
          \        schema.add_field(field_name=\"embedding\",datatype=DataType.FLOAT_VECTOR,dim=dim)\n\
          \        index_params=client_milvus.prepare_index_params()\n        index_params.add_index(\n\
          \            field_name=\"embedding\",\n            index_type=\"AUTOINDEX\"\
          ,\n            metric_type=\"COSINE\"\n        )\n        client_milvus.create_collection(\n\
          \            collection_name=collection_name,\n            schema=schema,\n\
          \            index_params=index_params\n        )\n        client_milvus.load_collection(collection_name)\n\
          \    text=md.replace(\"\\r\\n\",\"\\n\").strip()\n    paras=[p.strip() for\
          \ p in text.split(\"\\n\\n\") if p.strip()]\n    chunks=[]\n    current=\"\
          \"\n    maxi_chars=1000\n    for i in paras:\n        if current==\"\":\n\
          \            current=i\n        elif len(current)+len(i)<=maxi_chars:\n\
          \            current+=\" \"+i\n        else:\n            chunks.append(current)\n\
          \            current=i\n    if current:\n        chunks.append(current)\n\
          \n    # if current!=\"\":\n    #     chunks.append(current)\n    vectors=embedd.encode(chunks,normalize_embeddings=True,show_progress_bar=True).tolist()\n\
          \    ans=[]\n    for i,j in zip(chunks,vectors):\n        ans.append({\n\
          \            \"chunk_id\":str(uuid.uuid4()),\n            \"text\":i,\n\
          \            \"embedding\":j\n        })\n    client_milvus.insert(collection_name=collection_name,data=ans)\n\
          \    client_milvus.flush(collection_name=collection_name)\n    client_milvus.load_collection(collection_name)\n\
          \    return json.dumps(ans,ensure_ascii=False)\n\n"
        env:
        - name: MILVUS_URI
          value: http://host.minikube.internal:19532
        - name: MILVUS_TOKEN
          value: root:MILVUS
        - name: MILVUS_COLLECTION_NAME
          value: markdown_chunks
        - name: EMBEDDING_MODEL
          value: sentence-transformers/all-MiniLM-L6-v2
        image: python:3.12
