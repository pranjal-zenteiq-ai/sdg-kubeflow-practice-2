        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef llm_dean(ans:str)->str:\n    import os\n    import dotenv\n \
          \   from langchain_nvidia_ai_endpoints.chat_models import ChatNVIDIA\n \
          \   import json\n    dotenv.load_dotenv()\n    client_dean=ChatNVIDIA(\n\
          \        model=os.getenv(\"NVIDIA_MODEL2\"),\n        api_key=os.getenv(\"\
          NVIDIA_API_KEY2\"),\n        top_p=1,\n        temperature=0.3,\n      \
