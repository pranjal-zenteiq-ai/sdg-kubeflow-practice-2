          \        return obj\n    x=json.loads(ans)\n    if isinstance(x,str):\n\
          \        x=json.loads(x)\n    if isinstance(x,dict):\n        x=[x]\n  \
          \  if not isinstance(x,list):\n        raise ValueError(\"Format wrong mate\"\
          )\n    dean_output=[]\n    for i in x:\n        c=i.get(\"question\",\"\"\
          )\n        a=i.get(\"original_ans\",\"\")\n        candidate_answers=i.get(\"\
          candidate_answers\",[])\n        # prompt_dean=f\"\"\"\n        # You are\
          \ an expert evaluator.\n        # Question: {c}\n        # Ground Truth\
          \ Answer: {a}\n        # Candidate Answers to Evaluate: {json.dumps(candidate_answers,ensure_ascii=False)}\n\
          \        # Evaluation Rules:\n        # 1. Compare EACH candidate answer\
          \ against the Ground Truth Answer.\n        # 2. ACCEPT a candidate if it\
          \ correctly answers the question AND its core facts align with the Ground\
          \ Truth. Synonyms and rephrasing are perfectly fine.\n        # 3. REJECT\
          \ a candidate if it introduces new facts, industries, or concepts NOT found\
          \ in the Ground Truth (e.g., hallucinating external knowledge).\n      \
          \  # 4. REJECT a candidate if it contradicts the Ground Truth or misses\
          \ the core point.\n        # Output ONLY valid JSON without markdown code\
          \ blocks (no ```json) in this exact format:\n        # {{\n        # \"\
          question\": \"{c}\",\n        # \"original_ans\": \"{a}\",\n        # \"\
          candidate_answers\": [\"<only accepted answers>\"]\n        # }}\n     \
          \   # \"\"\"\n        prompt_dean = f\"\"\"\n        You are an expert evaluator.\n\
